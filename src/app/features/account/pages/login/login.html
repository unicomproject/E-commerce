<div class="max-w-[500px] mx-auto px-4 py-8">
  
  <!-- Header -->
  <h1 class="text-3xl font-bold text-gray-900 mb-2">Welcome back</h1>
  <p class="text-gray-600 mb-8">Sign in to view orders, loyalty rewards and faster checkout.</p>

  <!-- Error Message -->
  <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 text-red-700 border border-red-200 rounded-lg flex items-start gap-3">
    <div class="mt-0.5 flex-shrink-0">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
    </div>
    <div class="text-sm font-medium leading-tight">
      {{ errorMessage }}
    </div>
  </div>

  <!-- Login Form -->
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
    
    <!-- Email Field -->
    <div>
      <div class="relative flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within:border-gray-900 focus-within:ring-1 focus-within:ring-gray-900 transition-shadow">
        <div class="pl-4 pr-3 text-gray-500 flex items-center justify-center">
          <ng-icon name="lucideMail" size="20"></ng-icon>
        </div>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="Email address" 
          class="w-full py-4 pr-4 outline-none text-gray-900 placeholder-gray-500 bg-transparent"
        >
      </div>
      <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-red-500 text-sm mt-1">
        Please enter a valid email address.
      </div>
    </div>

    <!-- Password Field -->
    <div>
      <div class="relative flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within:border-gray-900 focus-within:ring-1 focus-within:ring-gray-900 transition-shadow">
        <div class="pl-4 pr-3 text-gray-500 flex items-center justify-center">
          <ng-icon name="lucideLock" size="20"></ng-icon>
        </div>
        <input 
          [type]="showPassword ? 'text' : 'password'" 
          formControlName="password" 
          placeholder="Password" 
          class="w-full py-4 pr-12 outline-none text-gray-900 placeholder-gray-500 bg-transparent"
        >
        <button 
          type="button" 
          (click)="togglePasswordVisibility()" 
          class="absolute right-4 text-gray-500 hover:text-gray-700 flex items-center justify-center"
        >
          <ng-icon [name]="showPassword ? 'lucideEyeOff' : 'lucideEye'" size="20"></ng-icon>
        </button>
      </div>
      <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-red-500 text-sm mt-1">
        Password is required.
      </div>
    </div>

    <!-- Remember Me & Forgot Password -->
    <div class="flex items-center justify-between py-2">
      <label class="flex items-center space-x-3 cursor-pointer">
        <input 
          type="checkbox" 
          formControlName="rememberMe" 
          class="w-5 h-5 rounded border-gray-300 text-brand-orange focus:ring-brand-orange"
        >
        <span class="text-gray-600">Remember me</span>
      </label>
      <button type="button" (click)="switchView.emit('forgot-password')" class="text-gray-900 font-bold hover:underline">
        Forgot password?
      </button>
    </div>

    <!-- Submit Buttons -->
    <div class="space-y-3 pt-2">
      <button 
        type="submit" 
        [disabled]="isLoading"
        class="w-full py-4 bg-brand-orange text-white font-bold rounded-lg hover:bg-brand-orange-dark transition-colors flex items-center justify-center disabled:opacity-70 disabled:cursor-not-allowed"
      >
        <span *ngIf="isLoading" class="mr-2 border-2 border-white border-t-transparent rounded-full w-5 h-5 animate-spin"></span>
        Sign In
      </button>
      
      <div class="pt-4 text-center">
        <span class="text-gray-600">Don't have an account? </span>
      </div>
      
      <button 
        type="button" 
        (click)="switchView.emit('register')"
        class="w-full py-4 bg-white text-brand-orange border border-brand-orange font-bold rounded-lg hover:bg-brand-orange-light transition-colors"
      >
        Create Account
      </button>
    </div>

  </form>

  <!-- OR Divider -->
  <div class="flex items-center my-8 text-gray-400">
    <div class="flex-1 border-t border-gray-200"></div>
    <span class="mx-4 text-sm font-medium">or</span>
    <div class="flex-1 border-t border-gray-200"></div>
  </div>

  <!-- Social Login -->
  <div class="space-y-3">
    <button class="w-full py-3.5 flex items-center justify-center space-x-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors font-medium text-gray-900">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25C22.56 11.47 22.49 10.72 22.36 10H12V14.26H17.92C17.67 15.63 16.86 16.79 15.69 17.57V20.34H19.26C21.35 18.42 22.56 15.6 22.56 12.25Z" fill="#4285F4"/>
        <path d="M12 23C14.97 23 17.46 22.02 19.26 20.34L15.69 17.57C14.71 18.23 13.47 18.63 12 18.63C9.16 18.63 6.75 16.71 5.86 14.14H2.18V16.99C4.01 20.63 7.7 23 12 23Z" fill="#34A853"/>
        <path d="M5.86 14.14C5.63 13.48 5.5 12.76 5.5 12C5.5 11.24 5.63 10.52 5.86 9.86V7.01H2.18C1.43 8.5 1 10.2 1 12C1 13.8 1.43 15.5 2.18 16.99L5.86 14.14Z" fill="#FBBC05"/>
        <path d="M12 5.38C13.62 5.38 15.06 5.94 16.21 7.03L19.34 3.9C17.45 2.14 14.97 1 12 1C7.7 1 4.01 3.37 2.18 7.01L5.86 9.86C6.75 7.29 9.16 5.38 12 5.38Z" fill="#EA4335"/>
      </svg>
      <span>Sign in with Google</span>
    </button>
    <button class="w-full py-3.5 flex items-center justify-center space-x-3 border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors font-medium text-gray-900">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="black" xmlns="http://www.w3.org/2000/svg">
        <path d="M16.89 15.56C16.89 12.35 19.5 10.76 19.63 10.67C18.15 8.51 15.86 8.2 15.11 8.16C13.16 7.97 11.28 9.32 10.29 9.32C9.3 9.32 7.76 8.19 6.13 8.21C4.01 8.24 2.13 9.44 1.05 11.34C-1.12 15.11 0.49 20.67 2.62 23.75C3.66 25.26 4.88 26.96 6.52 26.9C8.08 26.84 8.68 25.88 10.56 25.88C12.44 25.88 13 26.9 14.63 26.84C16.31 26.78 17.38 25.28 18.42 23.77C19.65 21.98 20.16 20.24 20.2 20.16C20.14 20.13 16.89 18.9 16.89 15.56Z" />
        <path d="M13.79 5.32C14.65 4.28 15.22 2.87 15.06 1.46C13.85 1.51 12.35 2.27 11.45 3.3C10.65 4.21 9.96 5.65 10.15 7.03C11.51 7.14 12.92 6.37 13.79 5.32Z" />
      </svg>
      <span>Sign in with Apple</span>
    </button>
  </div>

  <!-- Benefits Section -->
  <div class="mt-8 border border-gray-200 rounded-lg overflow-hidden bg-gray-50/50">
    <div class="flex items-center space-x-4 p-4 border-b border-gray-200">
      <div class="text-brand-orange">
        <ng-icon name="lucidePackage" size="24"></ng-icon>
      </div>
      <div class="text-gray-700">Track your orders</div>
    </div>
    <div class="flex items-center space-x-4 p-4 border-b border-gray-200">
      <div class="text-brand-orange">
        <ng-icon name="lucideMapPin" size="24"></ng-icon>
      </div>
      <div class="text-gray-700">Save addresses for faster checkout</div>
    </div>
    <div class="flex items-center space-x-4 p-4">
      <div class="text-brand-orange">
        <ng-icon name="lucideStar" size="24"></ng-icon>
      </div>
      <div class="text-gray-700">Access loyalty rewards & customer credit</div>
    </div>
  </div>

</div>
