<div class="p-3 lg:p-4 flex flex-row gap-3 lg:gap-4 relative group bg-white rounded-xl shadow-sm border border-gray-200">
          
  <!-- Delete Button (Top Right) -->
  <button (click)="removeItem()" class="absolute top-3 lg:top-4 right-3 lg:right-4 text-gray-400 hover:text-red-500 transition-colors z-10">
    <ng-icon name="lucideTrash2" size="18"></ng-icon>
  </button>
  
  <!-- Product Image -->
  <div class="w-20 h-20 lg:w-24 lg:h-24 bg-gray-100/80 rounded-lg flex items-center justify-center p-1.5 flex-shrink-0">
    <img *ngIf="item().imageUrl" [src]="item().imageUrl" [alt]="item().name" class="w-full h-full object-contain mix-blend-multiply">
  </div>
  
  <!-- Details -->
  <div class="flex-1 flex flex-col min-w-0">
    
    <div class="pr-8 mb-0.5">
      <h3 class="text-[14px] lg:text-base font-bold text-gray-900 leading-tight truncate">{{item().name}}</h3>
    </div>
    
    <!-- Variants -->
    <div *ngIf="item().options?.length" class="text-[11px] lg:text-xs text-gray-500 mb-1 flex flex-wrap items-center gap-1.5">
      <ng-container *ngFor="let opt of item().options; let last = last">
        <span>{{opt.name}}: {{opt.value}}</span>
        <span *ngIf="!last" class="text-gray-300">|</span>
      </ng-container>
    </div>
    
    <!-- Price -->
    <div class="text-[#DD4A24] font-bold text-[14px] lg:text-base mb-1">
      {{ item().unitPrice | tenantCurrency:'symbol':'1.2-2' }}
    </div>
    
    <!-- Stock Status -->
    <div *ngIf="item().isInStock" class="flex items-center text-green-600 text-[11px] lg:text-xs font-medium mb-2">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" class="mr-1"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      In stock
    </div>
    <div *ngIf="!item().isInStock" class="text-red-500 text-[11px] lg:text-xs font-medium mb-2">
      Out of stock
    </div>
    
    <!-- Bottom Row: Stepper and Item Total -->
    <div class="mt-auto flex items-center justify-between">
      <app-quantity-stepper 
        [quantity]="item().quantity" 
        (quantityChange)="updateQuantity($event)">
      </app-quantity-stepper>
      
      <div class="font-bold text-gray-900 text-[14px] lg:text-base">
        {{ item().lineTotal | tenantCurrency:'symbol':'1.2-2' }}
      </div>
    </div>
    
  </div>
</div>
