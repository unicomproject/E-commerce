<div class="search-page pb-24 lg:pb-12 bg-page-bg min-h-screen">
  
  <div class="w-full max-w-[1600px] mx-auto px-4 lg:px-6 lg:px-8 pt-2 pb-6">

    <!-- Header Section -->
    <app-page-header customClasses="!px-0 !pt-4 !pb-4 !border-b-0 mb-2">
      <!-- Search Input -->
      <div class="relative flex-grow">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <ng-icon name="lucideSearch" class="text-neutral-500" size="18" strokeWidth="2"></ng-icon>
        </div>
        <input type="text" [(ngModel)]="searchInput" (keyup.enter)="onSearchSubmit()"
          placeholder="Search for products..." 
          class="block w-full pl-10 pr-10 py-2.5 rounded-xl bg-white border border-neutral-300 text-neutral-900 placeholder-neutral-500 focus:outline-none focus:bg-white focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/30 text-[15px] shadow-sm transition-all">
        <button type="button" *ngIf="searchInput" (click)="onClearSearch()" class="absolute inset-y-0 right-0 pr-3 flex items-center z-10">
          <div class="bg-neutral-400 rounded-full w-5 h-5 flex items-center justify-center hover:bg-neutral-500 transition-colors">
            <ng-icon name="lucideX" class="text-white" size="14" strokeWidth="2.5"></ng-icon>
          </div>
        </button>
      </div>

    </app-page-header>
    



    <!-- Loading State -->
    <ng-container *ngIf="loading">
      <div class="grid grid-cols-3 lg:grid-cols-4 gap-3 lg:gap-6">
        <div *ngFor="let i of [1,2,3,4]" class="animate-pulse flex flex-col">
          <div class="bg-gray-200 aspect-[4/5] rounded-xl mb-3"></div>
          <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
          <div class="h-3 bg-gray-200 rounded w-1/2 mb-3"></div>
          <div class="h-5 bg-gray-200 rounded w-1/4"></div>
        </div>
      </div>
    </ng-container>

    <!-- Empty State -->
    <ng-container *ngIf="!loading && totalCount === 0">
      <div class="text-center py-20">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4 text-gray-400">
          <ng-icon name="lucideSearch" size="32"></ng-icon>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-1">No results found</h3>
        <p class="text-gray-500">Try adjusting your search or filters to find what you're looking for.</p>
      </div>
    </ng-container>

    <ng-container *ngIf="!loading && products.length > 0">
      <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 lg:gap-6">
        <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
      </div>
    </ng-container>

  </div>
</div>
