<div class="search-page pb-24 lg:pb-12 bg-white min-h-screen">
  
  <!-- Location Banner -->
  <app-fulfillment-selector></app-fulfillment-selector>

  <div class="w-full max-w-[1600px] mx-auto px-4 lg:px-6 lg:px-8 py-6">
    
    <!-- Breadcrumbs -->
    <app-breadcrumbs [items]="breadcrumbItems" class="mb-4 block"></app-breadcrumbs>

    <!-- Search Bar -->
    <div class="relative mb-6">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <ng-icon name="lucideSearch" class="text-gray-400" size="20"></ng-icon>
      </div>
      <input type="text" [(ngModel)]="searchInput" (keyup.enter)="onSearchSubmit()"
        placeholder="Search for products..." 
        class="block w-full pl-11 pr-11 py-3.5 border border-gray-200 rounded-2xl leading-5 bg-gray-50/50 placeholder-gray-400 focus:outline-none focus:bg-white focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/20 text-base transition-all shadow-sm">
      <button *ngIf="searchInput" (click)="onClearSearch()" class="absolute inset-y-0 right-0 pr-4 flex items-center">
        <ng-icon name="lucideXCircle" class="text-gray-400 hover:text-gray-600 transition-colors" size="20"></ng-icon>
      </button>
    </div>

    <!-- Header Section -->
    <div class="flex flex-row items-center justify-between mb-6 gap-2">
      <div>
        <h1 class="text-2xl lg:text-3xl font-extrabold text-brand-navy mb-1 tracking-tight flex items-center gap-2">
          <ng-container *ngIf="query">Search Results</ng-container>
          <ng-container *ngIf="!query && !categoryId">Products</ng-container>
          <ng-container *ngIf="!query && categoryId">{{ breadcrumbItems.length > 2 ? breadcrumbItems[2].label : 'Products' }}</ng-container>
        </h1>
        <p class="text-sm lg:text-base text-gray-600">
          <ng-container *ngIf="query">Results for "{{ query }}" ({{ totalCount }} results)</ng-container>
          <ng-container *ngIf="!query">{{ totalCount }} items</ng-container>
        </p>
      </div>
      <app-filter-sort-button></app-filter-sort-button>
    </div>


    <!-- Loading State -->
    <ng-container *ngIf="loading">
      <div class="grid grid-cols-3 lg:grid-cols-4 gap-3 lg:gap-6">
        <div *ngFor="let i of [1,2,3,4]" class="animate-pulse flex flex-col">
          <div class="bg-gray-200 aspect-[4/5] rounded-xl mb-3"></div>
          <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
          <div class="h-3 bg-gray-200 rounded w-1/2 mb-3"></div>
          <div class="h-5 bg-gray-200 rounded w-1/4"></div>
        </div>
      </div>
    </ng-container>

    <!-- Empty State -->
    <ng-container *ngIf="!loading && totalCount === 0">
      <div class="text-center py-20">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4 text-gray-400">
          <ng-icon name="lucideSearch" size="32"></ng-icon>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-1">No results found</h3>
        <p class="text-gray-500">Try adjusting your search or filters to find what you're looking for.</p>
      </div>
    </ng-container>

    <!-- Products Grid -->
    <ng-container *ngIf="!loading && products.length > 0">
      <div class="grid grid-cols-3 lg:grid-cols-4 gap-3 lg:gap-6">
        <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
      </div>
    </ng-container>

  </div>
</div>
