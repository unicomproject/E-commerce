<div class="search-page pb-24 lg:pb-12 bg-white min-h-screen">
  
  <!-- Location Banner -->
  <div class="bg-gray-50 border-b border-gray-200 py-3 px-4 lg:px-6 lg:px-8 text-sm flex flex-wrap justify-between items-center gap-2">
    <div class="flex items-center text-gray-700">
      <ng-icon name="lucideMapPin" class="text-brand-orange mr-2" size="18"></ng-icon>
      <span class="font-medium">Collect from:</span>
      <select class="bg-transparent border-none focus:ring-0 text-gray-900 font-semibold cursor-pointer py-0 pl-1 pr-6">
        <option>Etihad Stadium Store</option>
      </select>
    </div>
    <div class="text-gray-600 flex items-center gap-2">
      <span class="text-green-600 font-medium">Open</span>
      <span>Closes 10:00 PM</span>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-4 lg:px-6 lg:px-8 py-6">
    
    <!-- Breadcrumbs -->
    <nav class="flex text-sm text-gray-500 mb-6">
      <a routerLink="/" class="hover:text-gray-900">Home</a>
      <span class="mx-2">&gt;</span>
      <span class="text-gray-900 font-medium">Search Results</span>
    </nav>

    <!-- Header Section -->
    <div class="flex flex-col lg:flex-row lg:items-end justify-between mb-6 gap-4">
      <div>
        <h1 class="text-3xl font-extrabold text-gray-900 mb-1 tracking-tight">Search Results</h1>
        <p class="text-gray-600">Results for "{{ query }}" ({{ totalCount }} results)</p>
      </div>
      <button class="flex items-center justify-center gap-2 px-4 py-2 border border-gray-300 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors w-full lg:w-auto">
        <ng-icon name="lucideSlidersHorizontal" size="16"></ng-icon>
        Filter & Sort
      </button>
    </div>

    <!-- Tabs -->
    <app-tabs [tabs]="searchTabs" [(activeTabId)]="activeTab" theme="shaded"></app-tabs>

    <!-- Loading State -->
    <ng-container *ngIf="loading">
      <div class="grid grid-cols-2 lg:grid-cols-3 lg:grid-cols-4 gap-4 lg:gap-6">
        <div *ngFor="let i of [1,2,3,4]" class="animate-pulse flex flex-col">
          <div class="bg-gray-200 aspect-[4/5] rounded-xl mb-3"></div>
          <div class="h-4 bg-gray-200 rounded w-3/4 mb-2"></div>
          <div class="h-3 bg-gray-200 rounded w-1/2 mb-3"></div>
          <div class="h-5 bg-gray-200 rounded w-1/4"></div>
        </div>
      </div>
    </ng-container>

    <!-- Empty State -->
    <ng-container *ngIf="!loading && totalCount === 0">
      <div class="text-center py-20">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gray-100 mb-4 text-gray-400">
          <ng-icon name="lucideSearch" size="32"></ng-icon>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-1">No results found</h3>
        <p class="text-gray-500">Try adjusting your search or filters to find what you're looking for.</p>
      </div>
    </ng-container>

    <!-- Products Grid -->
    <ng-container *ngIf="!loading && products.length > 0 && (activeTab === 'all' || activeTab === 'products')">
      <div class="grid grid-cols-2 lg:grid-cols-3 lg:grid-cols-4 gap-4 lg:gap-6">
        <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
      </div>
    </ng-container>

  </div>
</div>
