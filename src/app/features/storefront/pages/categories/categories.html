<!-- Page Layout for Mobile/Desktop -->
<div class="min-h-screen bg-page-bg flex flex-col pb-20">
  
  <!-- Page Title -->
  <app-page-header title="Shop by Category"></app-page-header>

  <!-- Categories Grid -->
  <div class="flex-1 px-4 lg:px-8 py-6 w-full max-w-[1600px] mx-auto">
    <ng-container *ngIf="categories$ | async as categories; else loading">
      <div class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-8 gap-4 lg:gap-6">
        <!-- Category Card -->
        <app-category-card *ngFor="let category of categories" [category]="category" layout="grid"></app-category-card>
      </div>
    </ng-container>

    <ng-template #loading>
      <!-- Grid Loading Skeleton -->
      <div class="grid grid-cols-3 md:grid-cols-6 lg:grid-cols-8 gap-4 lg:gap-6">
        <div *ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]" class="animate-pulse flex flex-col">
          <div class="bg-gray-200 rounded-2xl aspect-square mb-3"></div>
          <div class="flex justify-between items-center px-1">
            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
            <div class="h-4 bg-gray-200 rounded-full w-8"></div>
          </div>
        </div>
      </div>
    </ng-template>
  </div>
</div>
