<div class="collections-page">
  <!-- Loading State -->
  <ng-container *ngIf="loading">
    <div class="skeleton-header"></div>
    <div class="skeleton-menu"></div>
    <div class="skeleton-grid">
      <div class="skeleton-card" *ngFor="let i of [1, 2, 3, 4]"></div>
    </div>
  </ng-container>

  <ng-container *ngIf="!loading && category">
    <!-- Breadcrumb -->
    <nav class="breadcrumb">
      <a routerLink="/" class="crumb-link">Home</a>
      <svg xmlns="http://www.w3.org/2000/svg" class="crumb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      <a routerLink="/categories" class="crumb-link">Shop</a>
      <svg xmlns="http://www.w3.org/2000/svg" class="crumb-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      <span class="crumb-current">{{category.name}}</span>
    </nav>

    <!-- Header Section -->
    <div class="category-header">
      <div class="header-content">
        <h1 class="category-title">{{category.name}}</h1>
        <p class="category-description" *ngIf="category.description">
          {{category.description}}
        </p>
      </div>
      <button class="filter-sort-btn">
        <svg xmlns="http://www.w3.org/2000/svg" class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
        <span>Filter & Sort</span>
      </button>
    </div>

    <!-- Horizontal Scroll Menu -->
    <div class="quick-nav-menu">
      <button class="nav-pill active">All {{category.name}}</button>
      <button class="nav-pill" *ngFor="let child of childCategories">
        {{child.name}}
      </button>
    </div>

    <!-- Items count & Sort -->
    <div class="list-meta">
      <div class="items-count">
        <strong>{{category.itemCount || 0}}</strong> items
      </div>
      <div class="sort-dropdown">
        <span>Sort by: Popular</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </div>
    </div>

    <!-- Categories Grid -->
  <ng-container *ngIf="!loading && childCategories.length > 0">
    <div class="items-grid">
      <app-category-card *ngFor="let child of childCategories" [category]="child" layout="grid"></app-category-card>
    </div>

    <!-- Delivery Banner -->
    <div class="delivery-banner">
      <div class="banner-icon-bg">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="truck-icon"><path d="M5 18H3c-.6 0-1-.4-1-1V7c0-.6.4-1 1-1h11c.6 0 1 .4 1 1v11"/><path d="M14 9h4l4 4v4c0 .6-.4 1-1 1h-2"/><circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/></svg>
      </div>
      <div class="banner-text">
        <div class="banner-title">Free delivery on orders over £99</div>
        <div class="banner-subtitle">Or collect in as little as 30 minutes</div>
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" class="banner-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </div>
  </ng-container>

  <!-- Products Grid (for subcategories) -->
  <ng-container *ngIf="!loading && childCategories.length === 0 && products.length > 0">
    <div class="grid grid-cols-2 lg:grid-cols-3 lg:grid-cols-4 gap-4 lg:gap-6 mt-6">
      <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
    </div>
  </ng-container>
  </ng-container>

  <ng-container *ngIf="!loading && !category">
    <div class="not-found">
      <h2>Category not found</h2>
      <a routerLink="/categories" class="back-link">Back to Shop</a>
    </div>
  </ng-container>
</div>
