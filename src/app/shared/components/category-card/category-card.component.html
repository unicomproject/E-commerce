<!-- List Layout (Used in Categories Grid) -->
<a *ngIf="layout === 'list'" [routerLink]="['/collections', category.slug]" 
   class="block bg-white rounded-xl shadow-sm overflow-hidden flex items-stretch border border-gray-100 hover:shadow-md transition-shadow cursor-pointer h-[100px]">
  
  <!-- Image Section -->
  <div class="w-[100px] h-[100px] bg-gray-100 flex-shrink-0">
    <img *ngIf="category.imageUrl" [src]="category.imageUrl" [alt]="category.name" class="w-full h-full object-cover">
    <div *ngIf="!category.imageUrl" class="w-full h-full flex items-center justify-center text-gray-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    </div>
  </div>

  <!-- Content Section -->
  <div class="p-3 flex-1 flex flex-col justify-center">
    <h2 class="text-lg font-bold text-gray-900 leading-tight">{{ category.name }}</h2>
    <p class="text-xs text-gray-500 mt-1 line-clamp-1">{{ category.description || 'Explore this collection' }}</p>
    <div class="text-[11px] text-brand-orange font-medium mt-1.5">
      {{ category.itemCount || 0 }} items
    </div>
  </div>

  <!-- Arrow Icon -->
  <div class="w-10 flex items-center justify-center text-gray-400 flex-shrink-0 border-l border-gray-50 bg-gray-50/50">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
      <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" />
    </svg>
  </div>
</a>

<!-- Grid Layout (Used in Collections/Subcategories Grid) -->
<a *ngIf="layout === 'grid'" [routerLink]="['/collections', category.slug]" class="item-card group block">
  <div class="item-image-wrapper bg-gray-100 rounded-2xl overflow-hidden aspect-square relative flex items-center justify-center mb-3">
    <img *ngIf="category.imageUrl" [src]="category.imageUrl" [alt]="category.name" class="w-full h-full object-cover mix-blend-multiply transition-transform duration-500 group-hover:scale-105" loading="lazy">
    <div *ngIf="!category.imageUrl" class="w-full h-full flex items-center justify-center text-gray-400 bg-gray-100 transition-transform duration-500 group-hover:scale-105">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 lg:h-12 lg:w-12 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
      </svg>
    </div>
  </div>
  <div class="flex items-center justify-between px-1">
    <span class="font-bold text-gray-900 text-sm lg:text-base group-hover:text-brand-orange transition-colors">{{ category.name }}</span>
    <span class="bg-gray-100 text-gray-600 text-[10px] font-bold px-2 py-0.5 rounded-full" *ngIf="category.itemCount">{{ category.itemCount }}</span>
  </div>
</a>
