<div class="border-b border-gray-200 mb-8 overflow-x-auto no-scrollbar">
  <nav class="flex min-w-max" [class.space-x-8]="theme === 'plain'" [class.px-2]="theme === 'plain'" [class.pb-px]="theme === 'shaded'">
    <button *ngFor="let tab of tabs" 
            (click)="selectTab(tab.id)"
            [class]="getTabClass(tab.id)">
      {{ tab.label }}
      <span *ngIf="tab.count !== undefined" [class.ml-1]="theme === 'plain'">
        ({{ tab.count }})
      </span>
    </button>
  </nav>
</div>
