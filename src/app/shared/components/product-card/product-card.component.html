<a [routerLink]="['/product', product.slug]" class="group flex flex-col cursor-pointer block h-full bg-card-bg rounded-2xl border border-card-border p-2 lg:p-3 shadow-sm hover:shadow-md transition-shadow duration-300">
  <!-- Image Container -->
  <div class="relative bg-neutral-50 rounded-xl overflow-hidden aspect-square mb-3">
    
    <!-- Top left badges -->
    <div class="absolute top-2 left-2 lg:top-3 lg:left-3 z-20 flex flex-col gap-1.5 items-start">
      <div *ngIf="product.isInStock === false" class="bg-[#FF4D4F] text-white text-[11px] lg:text-xs font-bold px-2 py-1 rounded-md tracking-wide shadow-sm">
        Out of Stock
      </div>
      <div *ngIf="product.badge && product.isInStock !== false" class="bg-red-500 text-white text-[10px] lg:text-xs font-bold px-2 py-0.5 rounded-full tracking-wide">
        {{ product.badge }}
      </div>
    </div>

    <!-- Wishlist Button -->
    <button 
      [class]="'absolute top-2 right-2 lg:top-3 lg:right-3 z-20 w-8 h-8 lg:w-9 lg:h-9 bg-white rounded-full flex items-center justify-center transition-all shadow-sm border ' + (isInWishlist() ? 'border-brand-orange-light text-brand-orange' : 'border-neutral-100 text-neutral-800 hover:border-neutral-200')" 
      (click)="toggleWishlist($event)">
      <ng-icon name="lucideHeart" class="text-[16px] lg:text-[18px]" [attr.fill]="isInWishlist() ? 'currentColor' : 'none'"></ng-icon>
    </button>
    
    <!-- Product Image -->
    <img [src]="product.imageUrl || 'assets/placeholder-product.png'" [alt]="product.name" class="w-full h-full object-cover mix-blend-multiply group-hover:scale-105 transition-transform duration-500" loading="lazy" />
  </div>

  <!-- Product Details -->
  <div class="flex flex-col flex-grow px-1">
    <h4 class="text-[15px] font-semibold text-neutral-900 mb-1 line-clamp-2 group-hover:text-brand-orange transition-colors">
      {{ product.name }}
    </h4>
    
    <!-- Price Row -->
    <div class="flex items-center gap-2 mb-3">
      <span class="text-lg font-bold text-neutral-900">
        {{ product.price | tenantCurrency:'symbol':'1.0-0' }}
      </span>
      <span *ngIf="product.originalPrice" class="text-sm font-medium text-neutral-400 line-through">
        {{ product.originalPrice | tenantCurrency:'symbol':'1.0-0' }}
      </span>
    </div>

    <!-- Footer Row: Rating -->
    <div class="flex items-center mt-auto">
      <div class="flex items-center gap-1.5">
        <ng-icon name="lucideStar" class="text-[#FFC107] text-[16px]" fill="currentColor"></ng-icon>
        <span class="text-sm font-bold text-neutral-900">{{ product.rating || '0.0' }}</span>
        <span class="text-sm font-medium text-neutral-500">({{ product.reviewCount || 0 }})</span>
      </div>
    </div>
  </div>
</a>
