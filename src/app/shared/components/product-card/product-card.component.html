<a [routerLink]="['/product', product.slug]" class="group flex flex-col cursor-pointer block h-full">
  <!-- Image Container -->
  <div class="relative bg-neutral-100 rounded-xl overflow-hidden aspect-square mb-3">
    
    <!-- Top left badge -->
    <div *ngIf="product.badge" class="absolute top-3 left-3 z-20 bg-brand-orange text-white text-[10px] font-bold px-2 py-1 rounded-md uppercase tracking-wide">
      {{ product.badge }}
    </div>

    <!-- Wishlist Button -->
    <button class="absolute top-3 right-3 z-20 w-8 h-8 lg:w-10 lg:h-10 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center text-neutral-500 hover:text-red-500 hover:bg-white transition-colors shadow-sm" (click)="$event.preventDefault()">
      <ng-icon name="lucideHeart" class="text-[18px] lg:text-[20px]"></ng-icon>
    </button>
    
    <!-- Product Image -->
    <img [src]="product.imageUrl || 'assets/placeholder-product.png'" [alt]="product.name" class="w-full h-full object-cover mix-blend-multiply group-hover:scale-105 transition-transform duration-500" loading="lazy" />
    
    <!-- Add to Cart Overlay (Desktop Only) -->
    <div class="hidden lg:flex absolute inset-x-0 bottom-0 p-4 translate-y-full group-hover:translate-y-0 transition-transform duration-300 z-10 bg-gradient-to-t from-black/50 to-transparent">
      <button class="w-full bg-brand-orange hover:bg-brand-orange-dark text-white font-bold py-2.5 rounded-lg shadow-lg transform active:scale-95 transition-all" (click)="$event.preventDefault()">
        Add to Cart
      </button>
    </div>
  </div>

  <!-- Product Details -->
  <div class="flex flex-col flex-grow">
    <h4 class="text-sm font-semibold text-brand-black mb-1 line-clamp-2 group-hover:text-brand-orange transition-colors">
      {{ product.name }}
    </h4>
    <p class="text-sm font-bold text-brand-black mb-2">
      ${{ product.price.toFixed(2) }}
    </p>

    <!-- Ratings -->
    <div class="flex items-center gap-1.5 mt-auto mb-2">
      <app-star-rating [rating]="product.rating" [size]="12"></app-star-rating>
      <span class="text-xs text-neutral-500 font-medium">({{ product.reviewCount }})</span>
    </div>

    <!-- Stock Status (Optional, keeping it subtle) -->
    <div *ngIf="!product.isInStock" class="text-[10px] font-bold text-red-600 mt-1">
      Out of stock
    </div>
  </div>
</a>
