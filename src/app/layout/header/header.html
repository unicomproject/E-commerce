<header [class.-translate-y-full]="isNavbarHidden" class="backdrop-blur-md bg-white/70 border-b border-gray-200/50 shadow-sm transition-all duration-300">
  <div class="w-full max-w-[1600px] mx-auto px-4 lg:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20 gap-4 lg:gap-8">
      
      <!-- Left Side: Logo, Nav, Search -->
      <div class="flex items-center gap-4 lg:gap-8 flex-1">
        
        <!-- Mobile Menu & Logo -->
        <div class="flex-shrink-0 flex items-center cursor-pointer gap-2 lg:gap-4">
          <!-- Hamburger Menu (Mobile/Tablet Only) -->
          <button class="lg:hidden relative p-2 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full">
            <ng-icon name="lucideMenu" class="text-[24px]" strokeWidth="1.5"></ng-icon>
          </button>

          <!-- Logo -->
          <div class="text-2xl lg:text-3xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent hover:scale-105 transition-transform">
            Unified<span class="text-neutral-900">Commerce</span>
          </div>
        </div>
        
        <!-- Desktop Navigation -->
        <nav class="hidden lg:flex items-center gap-6 font-medium flex-shrink-0">
          <a routerLink="/search" class="text-neutral-600 hover:text-brand-orange transition-colors cursor-pointer h-20 flex items-center">
            Shop All
          </a>
          
          <div class="relative group h-20 flex items-center">
            <a routerLink="/categories" class="flex items-center gap-1.5 text-neutral-600 hover:text-brand-orange transition-colors cursor-pointer">
              Categories
              <ng-icon name="lucideChevronDown" class="text-[16px] text-neutral-400 group-hover:text-brand-orange transition-transform duration-300 group-hover:rotate-180"></ng-icon>
            </a>
            
            <!-- Mega Menu Container -->
            <div class="absolute top-[80px] left-0 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 transform translate-y-2 group-hover:translate-y-0 z-50">
              <app-category-mega-menu></app-category-mega-menu>
            </div>
          </div>
        </nav>

        <!-- Search (Desktop) -->
        <div class="hidden lg:flex items-center relative flex-1 max-w-3xl">
          <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" placeholder="Search products..." class="w-full h-10 pl-10 pr-10 rounded-xl bg-soft-control-bg border border-border-color text-neutral-900 placeholder-neutral-500 focus:bg-white focus:border-brand-orange focus:ring-2 focus:ring-brand-orange/30 transition-all text-sm outline-none">
          <ng-icon name="lucideSearch" class="absolute left-3 text-neutral-400 text-[18px]" strokeWidth="2"></ng-icon>
          <button type="button" *ngIf="searchQuery" (click)="clearSearch()" class="absolute inset-y-0 right-0 pr-3 flex items-center z-10">
            <div class="bg-neutral-400 rounded-full w-5 h-5 flex items-center justify-center hover:bg-neutral-500 transition-colors">
              <ng-icon name="lucideX" class="text-white" size="14" strokeWidth="2.5"></ng-icon>
            </div>
          </button>
        </div>

      </div>

      <!-- Right Side: Icons / Actions -->
      <div class="flex items-center space-x-2 lg:space-x-4 flex-shrink-0">
        
        <!-- Notification (Mobile and Desktop) -->
        <button (click)="showComingSoon('Notifications')" class="relative p-1 lg:p-2.5 text-neutral-600 hover:text-brand-orange transition-all duration-300 hover:bg-brand-orange-light/50 rounded-full group">
          <ng-icon name="lucideBell" class="text-[20px] lg:text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
        </button>

        <!-- Wishlist (Mobile and Desktop) -->
        <a routerLink="/wishlist" class="relative p-1 lg:p-2.5 text-neutral-600 hover:text-brand-orange transition-all duration-300 hover:bg-brand-orange-light/50 rounded-full group block">
          <ng-icon name="lucideHeart" class="text-[20px] lg:text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
          <ng-container *ngIf="wishlistTotalItems$ | async as wTotal">
            <span *ngIf="wTotal > 0" class="absolute top-0 right-0 lg:top-1.5 lg:right-1.5 flex h-3.5 w-3.5 lg:h-4 lg:w-4 items-center justify-center rounded-full bg-brand-orange text-[9px] lg:text-[10px] font-bold text-white shadow-sm ring-1 ring-white">
              {{ wTotal }}
            </span>
          </ng-container>
        </a>

        <!-- Orders (Mobile and Desktop) -->
        <button (click)="openRecentOrders()" class="relative p-1 lg:p-2.5 text-neutral-600 hover:text-brand-orange transition-all duration-300 hover:bg-brand-orange-light/50 rounded-full group block">
          <ng-icon name="lucideClock" class="text-[20px] lg:text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
        </button>

        <!-- Cart (Desktop Only) -->
        <button #cartIconBtn routerLink="/cart" [class.animate-cart-jiggle]="cartAnimationService.desktopCartJiggle$()" class="hidden lg:block relative p-1 lg:p-2.5 text-neutral-600 hover:text-brand-orange transition-all duration-300 hover:bg-brand-orange-light/50 rounded-full group">
          <ng-icon name="lucideShoppingCart" class="text-[20px] lg:text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
          <ng-container *ngIf="totalItems$ | async as total">
            <span *ngIf="total > 0" class="absolute top-1.5 right-1.5 flex h-4 w-4 items-center justify-center rounded-full bg-brand-orange text-[10px] font-bold text-white shadow-sm ring-1 ring-white">
              {{ total }}
            </span>
          </ng-container>
        </button>

        <!-- Vertical Divider -->
        <div class="hidden lg:block h-6 w-px bg-neutral-200 mx-2"></div>

        <!-- Profile (Desktop Only) -->
        <ng-container *ngIf="(currentUser$ | async) as user; else loggedOutState">
          <div class="hidden lg:flex items-center space-x-3 relative group py-4">
            <div class="flex flex-col items-end cursor-pointer">
              <span class="text-sm font-bold text-gray-900 leading-tight">{{ user.displayName }}</span>
            </div>
            <a routerLink="/account" class="h-9 w-9 rounded-full bg-brand-orange text-white flex items-center justify-center font-bold shadow-sm hover:bg-brand-orange-dark transition-colors cursor-pointer relative z-10">
              {{ user.displayName.charAt(0).toUpperCase() }}
            </a>
            
            <!-- Dropdown Menu -->
            <div class="absolute right-0 top-full -mt-2 w-64 bg-white rounded-xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.2)] border border-gray-100 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50 transform translate-y-2 group-hover:translate-y-0">
              
              <!-- User Info Header -->
              <div class="p-4 border-b border-gray-100 flex items-center gap-3 bg-gray-50/50 rounded-t-xl">
                <div class="h-12 w-12 rounded-full bg-brand-orange text-white flex items-center justify-center font-bold text-lg shadow-sm">
                  {{ user.displayName.charAt(0).toUpperCase() }}
                </div>
                <div class="flex-1 min-w-0">
                  <div class="font-bold text-gray-900 truncate">{{ user.displayName }}</div>
                  <div class="text-xs text-gray-500 truncate">{{ user.email }}</div>
                </div>
              </div>
              
              <!-- Menu Links -->
              <div class="p-2 space-y-0.5">
                <a routerLink="/orders" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-orange-light/30 text-gray-700 hover:text-brand-orange transition-colors group/item">
                  <ng-icon name="lucidePackage" size="18" class="text-gray-400 group-hover/item:text-brand-orange transition-colors"></ng-icon>
                  <span class="text-sm font-medium">Your orders</span>
                </a>
                <a routerLink="/account" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-orange-light/30 text-gray-700 hover:text-brand-orange transition-colors group/item">
                  <ng-icon name="lucideUser" size="18" class="text-gray-400 group-hover/item:text-brand-orange transition-colors"></ng-icon>
                  <span class="text-sm font-medium">Your profile</span>
                </a>
                <a routerLink="/wishlist" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-orange-light/30 text-gray-700 hover:text-brand-orange transition-colors group/item">
                  <ng-icon name="lucideHeart" size="18" class="text-gray-400 group-hover/item:text-brand-orange transition-colors"></ng-icon>
                  <span class="text-sm font-medium">Wishlist</span>
                </a>
                <a routerLink="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-orange-light/30 text-gray-700 hover:text-brand-orange transition-colors group/item">
                  <ng-icon name="lucideMapPin" size="18" class="text-gray-400 group-hover/item:text-brand-orange transition-colors"></ng-icon>
                  <span class="text-sm font-medium">Addresses</span>
                </a>
                <a routerLink="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-brand-orange-light/30 text-gray-700 hover:text-brand-orange transition-colors group/item">
                  <ng-icon name="lucideShieldCheck" size="18" class="text-gray-400 group-hover/item:text-brand-orange transition-colors"></ng-icon>
                  <span class="text-sm font-medium">Account security</span>
                </a>
              </div>
              
              <!-- Logout -->
              <div class="p-2 border-t border-gray-100 bg-gray-50/50 rounded-b-xl">
                <button (click)="logout()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-red-50 text-red-600 transition-colors group/item">
                  <ng-icon name="lucideLogOut" size="18" class="text-red-400 group-hover/item:text-red-500 transition-colors"></ng-icon>
                  <span class="text-sm font-medium">Sign Out</span>
                </button>
              </div>
              
            </div>
          </div>
        </ng-container>
        <ng-template #loggedOutState>
          <button (click)="openAuthModal()" class="hidden lg:flex items-center space-x-2 p-1 pl-2 pr-1 rounded-full hover:bg-neutral-100 transition-all duration-300 border border-transparent hover:border-neutral-200">
            <span class="text-sm font-medium text-neutral-700 pl-1">Sign In</span>
            <div class="h-8 w-8 rounded-full bg-neutral-900 flex items-center justify-center text-white shadow-md">
              <ng-icon name="lucideUser" class="text-sm" strokeWidth="2"></ng-icon>
            </div>
          </button>
        </ng-template>
      </div>
      
    </div>
  </div>
</header>

<!-- Floating Cart for Mobile/Tablet -->
<ng-container *ngIf="totalItems$ | async as total">
  <div class="fixed inset-0 pointer-events-none z-40 lg:hidden" #dragBoundary></div>
  <div cdkDrag [cdkDragBoundary]="dragBoundary" class="lg:hidden fixed bottom-24 right-6 z-50 pointer-events-auto">
    <a *ngIf="total > 0"
       #mobileCartIconBtn
       routerLink="/cart"
       [class.animate-cart-jiggle]="cartAnimationService.mobileCartJiggle$()"
       class="flex items-center justify-center w-14 h-14 bg-brand-orange text-white rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.12)] active:scale-95 transition-transform duration-300 cursor-move animate-cart-pop-in">
      <ng-icon name="lucideShoppingBag" class="text-[24px]" strokeWidth="1.5"></ng-icon>
      <span class="absolute -top-1 -right-1 flex h-5 w-5 items-center justify-center rounded-full bg-neutral-900 text-[11px] font-bold text-white shadow-sm ring-2 ring-white">
        {{ total }}
      </span>
    </a>
  </div>
</ng-container>

<!-- Modals & Overlays -->
<app-recent-orders-bottom-sheet></app-recent-orders-bottom-sheet>
