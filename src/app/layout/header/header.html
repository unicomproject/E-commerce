<header class="sticky top-0 z-50 w-full backdrop-blur-md bg-white/70 border-b border-gray-200/50 shadow-sm transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center cursor-pointer">
        <div class="text-3xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent hover:scale-105 transition-transform">
          Unified<span class="text-neutral-900">Commerce</span>
        </div>
      </div>
      
      <!-- Desktop Navigation -->
      <nav class="hidden md:flex space-x-10 items-center font-medium">
        <a href="#" class="text-neutral-600 hover:text-indigo-600 transition-colors">Catalog</a>
        <a href="#" class="text-neutral-600 hover:text-indigo-600 transition-colors">Categories</a>
        <a href="#" class="text-neutral-600 hover:text-indigo-600 transition-colors">Offers</a>
      </nav>

      <!-- Icons / Actions -->
      <div class="flex items-center space-x-2 sm:space-x-4">
        <!-- Search -->
        <button class="relative p-2.5 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full group">
          <ng-icon name="lucideSearch" class="text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
        </button>

        <!-- Wishlist -->
        <button class="relative p-2.5 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full group">
          <ng-icon name="lucideHeart" class="text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
        </button>

        <!-- Cart -->
        <button class="relative p-2.5 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full group">
          <ng-icon name="lucideShoppingCart" class="text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
          <span class="absolute top-1.5 right-1.5 flex h-4 w-4 items-center justify-center rounded-full bg-black text-[10px] font-bold text-white shadow-sm ring-2 ring-white">
            3
          </span>
        </button>

        <!-- Vertical Divider -->
        <div class="hidden sm:block h-6 w-px bg-neutral-200 mx-2"></div>

        <!-- Profile -->
        <button class="flex items-center space-x-2 p-1 pl-2 pr-1 rounded-full hover:bg-neutral-100 transition-all duration-300 border border-transparent hover:border-neutral-200">
          <span class="hidden sm:block text-sm font-medium text-neutral-700 pl-1">Sign In</span>
          <div class="h-8 w-8 rounded-full bg-neutral-900 flex items-center justify-center text-white shadow-md">
            <ng-icon name="lucideUser" class="text-sm" strokeWidth="2"></ng-icon>
          </div>
        </button>
      </div>
      
    </div>
  </div>
</header>
