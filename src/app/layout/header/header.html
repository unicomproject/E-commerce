<header class="backdrop-blur-md bg-white/70 border-b border-gray-200/50 shadow-sm transition-all duration-300">
  <div class="max-w-7xl mx-auto px-4 lg:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      
      <!-- Mobile Menu & Logo -->
      <div class="flex-shrink-0 flex items-center cursor-pointer gap-2 lg:gap-4">
        <!-- Hamburger Menu (Mobile/Tablet Only) -->
        <button class="lg:hidden relative p-2 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full">
          <ng-icon name="lucideMenu" class="text-[24px]" strokeWidth="1.5"></ng-icon>
        </button>

        <!-- Logo -->
        <div class="text-2xl lg:text-3xl font-extrabold tracking-tighter bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent hover:scale-105 transition-transform">
          Unified<span class="text-neutral-900">Commerce</span>
        </div>
      </div>
      
      <!-- Desktop Navigation -->
      <nav class="hidden lg:flex space-x-6 xl:space-x-10 items-center font-medium">
        <a href="#" class="text-neutral-600 hover:text-indigo-600 transition-colors">Catalog</a>
        <a href="#" class="text-neutral-600 hover:text-indigo-600 transition-colors">Categories</a>
        <a href="#" class="text-neutral-600 hover:text-indigo-600 transition-colors">Offers</a>
      </nav>

      <!-- Icons / Actions -->
      <div class="flex items-center space-x-2 lg:space-x-4">
        <button routerLink="/search" class="lg:hidden relative p-1 lg:p-2.5 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full group">
          <ng-icon name="lucideSearch" class="text-[20px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
        </button>

        <div class="hidden lg:flex items-center relative mr-2 lg:mr-4">
          <input type="text" [(ngModel)]="searchQuery" (keyup.enter)="onSearch()" placeholder="Search products..." class="w-48 lg:w-64 xl:w-80 h-10 pl-10 pr-4 rounded-full bg-neutral-100/80 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 transition-all text-sm outline-none">
          <ng-icon name="lucideSearch" class="absolute left-3 text-neutral-400 text-[18px]" strokeWidth="2"></ng-icon>
        </div>

        <!-- Wishlist (Hidden on mobile/tablet) -->
        <button class="hidden lg:block relative p-2.5 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full group">
          <ng-icon name="lucideHeart" class="text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
        </button>

        <!-- User Profile (Mobile/Tablet Only Icon) -->
        <button (click)="openAuthModal()" class="lg:hidden relative p-1 lg:p-2.5 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full group">
          <ng-icon name="lucideUser" class="text-[20px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
        </button>

        <!-- Cart -->
        <button routerLink="/cart" class="relative p-1 lg:p-2.5 text-neutral-600 hover:text-black transition-all duration-300 hover:bg-neutral-100/80 rounded-full group">
          <ng-icon name="lucideShoppingCart" class="text-[20px] lg:text-[22px] transition-transform group-hover:scale-110" strokeWidth="1.5"></ng-icon>
          <ng-container *ngIf="cart$ | async as cart">
            <span *ngIf="cart.items.length > 0" class="absolute top-0 right-0 lg:top-1.5 lg:right-1.5 flex h-3.5 w-3.5 lg:h-4 lg:w-4 items-center justify-center rounded-full bg-brand-orange text-[9px] lg:text-[10px] font-bold text-white shadow-sm ring-1 ring-white">
              {{ cart.items.length }}
            </span>
          </ng-container>
        </button>

        <!-- Vertical Divider -->
        <div class="hidden lg:block h-6 w-px bg-neutral-200 mx-2"></div>

        <!-- Profile (Desktop Only) -->
        <ng-container *ngIf="(currentUser$ | async) as user; else loggedOutState">
          <div class="hidden lg:flex items-center space-x-3">
            <div class="flex flex-col items-end">
              <span class="text-sm font-bold text-gray-900 leading-tight">{{ user.displayName }}</span>
              <button (click)="logout()" class="text-xs text-gray-500 hover:text-red-500 transition-colors">Logout</button>
            </div>
            <a routerLink="/account" class="h-9 w-9 rounded-full bg-brand-orange text-white flex items-center justify-center font-bold shadow-sm hover:bg-brand-orange-dark transition-colors">
              {{ user.displayName.charAt(0).toUpperCase() }}
            </a>
          </div>
        </ng-container>
        <ng-template #loggedOutState>
          <button (click)="openAuthModal()" class="hidden lg:flex items-center space-x-2 p-1 pl-2 pr-1 rounded-full hover:bg-neutral-100 transition-all duration-300 border border-transparent hover:border-neutral-200">
            <span class="text-sm font-medium text-neutral-700 pl-1">Sign In</span>
            <div class="h-8 w-8 rounded-full bg-neutral-900 flex items-center justify-center text-white shadow-md">
              <ng-icon name="lucideUser" class="text-sm" strokeWidth="2"></ng-icon>
            </div>
          </button>
        </ng-template>
      </div>
      
    </div>
  </div>
</header>
